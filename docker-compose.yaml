version: '3.8'

services:
  heartbeat-server:
    build: .
    restart: always
    
    # THE MAGIC FIX: 
    # This tells Compose NOT to create a custom NAT bridge network, 
    # but to pass `--network=pasta` directly to Podman just like our CLI test.
    network_mode: "pasta"
    
    # Standard ports work perfectly now because Podman handles the translation
    ports:
      - "127.0.0.1:8334:8333/tcp" # Host 8334 -> Container 8333 (Internal only)
      - "8333:8333/udp"           # Host 8333 -> Container 8333 (Direct for hardware)
    
    volumes:
      - ./data:/data
      - ./logs:/app/logs
      
    environment:
      - RUNNING_IN_CONTAINER=true
      - PYTHONPATH=/app
      - DJANGO_DEBUG=False
      - DJANGO_ALLOWED_HOSTS=hb.tenthlight.com