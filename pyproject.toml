[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "heartbeat-backend"
version = "0.1.0"
description = "Single-project Django heartbeat service"
dependencies = [
    "django>=5.0",
    "waitress>=3.0",
]
requires-python = ">=3.10"

[tool.setuptools.packages.find]
where = ["src"]
